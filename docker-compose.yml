x-common: &common
  image: nvcr.io/nvidia/docling:0.0.1-rc3
  working_dir: /workspace/app
  environment:
    - PATH=/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    - VIRTUAL_ENV=/opt/venv
  volumes:
    - ${APP_PATH:-/home/user/workspace/docling-rag}:/workspace/app
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: docling-postgres
    shm_size: 4g
    environment:
      POSTGRES_DB: docling_rag
      POSTGRES_USER: docling
      POSTGRES_PASSWORD: docling
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docling -d docling_rag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  techpub:
    <<: *common
    container_name: docling-techpub
    volumes:
      - ${APP_PATH:-/home/user/workspace/docling-rag}:/workspace/app
      - ${TECHPUB_DATA_PATH:-/home/user/workspace/data/techpub}:/workspace/data
      - "${TECHPUB_DOCS_PATH:-/mnt/techpub-docs/3. General Military Publications}:/workspace/docs"
    ports:
      - "${TECHPUB_PORT:-9090}:9090"
    command: python -m cli mcp techpub

  safety:
    <<: *common
    container_name: docling-safety
    volumes:
      - ${APP_PATH:-/home/user/workspace/docling-rag}:/workspace/app
      - ${SAFETY_DATA_PATH:-/home/user/workspace/data}:/workspace/data
      - ${SAFETY_DOCS_PATH:-/home/user/workspace/docs}:/workspace/docs
    ports:
      - "${SAFETY_PORT:-9091}:9090"
    command: python -m cli mcp safety

volumes:
  pgdata:
